<!doctype html>
<html lang="{{ $.Site.Language.Lang }}" dir="rtl">
  {{ partial "head" . }}
  <body class="sans-serif" style="font-family: 'Vazirmatn', 'Nunito Sans', sans-serif;">

    {{ block "header" . }}{{ partial "nav" . }}{{end}}

    {{ block "main" . }}{{ end }}

    {{ block "footer" . }}{{ partial "footer" . }}{{end}}

    {{ $script := .Site.Data.webpack.main }}
    {{ with $script.js }}
      <script src="{{ relURL . }}"></script>
    {{ end }}
  </body>
</html>
