<!-- Contact -->
<div class="mb4 pa4 br3" style="background-color: var(--grey-2); border: 1px solid var(--grey-4);">
  <h4 class="f3 b lh-title mb4 tc" style="color: var(--white); font-family: 'Vazirmatn', sans-serif; direction: rtl;">با ما در ارتباط باشید</h4>

  <form action="" style="font-family: 'Vazirmatn', sans-serif; direction: rtl;">
    <div class="flex-l mhn1-l">
      <!-- Name -->
      <div class="ph1-l w-50-l">
        <fieldset class="bn pa0">
          <label for="name" class="db mb2" style="color: var(--grey-3); font-weight: 600;">نام</label>
          <input type="text" id="name" name="name" placeholder="نام شما" class="w-100 mb3 pa3 br3 bn" style="background-color: var(--black); color: var(--white); border: 1px solid var(--grey-4); font-family: 'Vazirmatn', sans-serif;">
        </fieldset>
      </div>
      <!-- Email -->
      <div class="ph1-l w-50-l">
        <fieldset class="bn pa0">
          <label for="email" class="db mb2" style="color: var(--grey-3); font-weight: 600;">ایمیل</label>
          <input type="email" id="email" name="email" placeholder="ایمیل شما" class="w-100 mb3 pa3 br3 bn" style="background-color: var(--black); color: var(--white); border: 1px solid var(--grey-4); font-family: 'Vazirmatn', sans-serif;">
        </fieldset>
      </div>
    </div>

    <!-- Message -->
    <fieldset class="bn pa0">
      <label for="message" class="db mb2" style="color: var(--grey-3); font-weight: 600;">پیام</label>
      <textarea id="message" name="message" placeholder="پیام شما" rows="6" cols="80" class="w-100 mb3 pa3 br3 bn" style="background-color: var(--black); color: var(--white); border: 1px solid var(--grey-4); font-family: 'Vazirmatn', sans-serif; resize: vertical;"></textarea>
    </fieldset>
    <!-- Button -->
    <div class="tc">
      <button type="submit" class="pa3 f5 fw6 br3 bn pointer" style="background-color: var(--primary); color: var(--black); font-family: 'Vazirmatn', sans-serif; transition: all 0.3s ease; cursor: pointer;">ارسال پیام</button>
    </div>
  </form>
</div>
    </div>
  </form>
</div>
