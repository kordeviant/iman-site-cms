
      <svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
        
      <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
          <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#E5E5E5;stop-opacity:1" />
          <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#A0A0A0;stop-opacity:1" />
        </linearGradient>
        <radialGradient id="gemGradient" cx="50%" cy="30%" r="70%">
          <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.9" />
          <stop offset="50%" style="stop-color:#4169E1;stop-opacity:0.7" />
          <stop offset="100%" style="stop-color:#191970;stop-opacity:0.8" />
        </radialGradient>
      </defs>
    
        <rect width="100%" height="100%" fill="#f8f8f8"/>
        
        <!-- Bracelet band -->
        <ellipse cx="300" cy="200" rx="120" ry="40" 
                 fill="none" stroke="url(#goldGradient)" stroke-width="12"/>
        
        <!-- Gems along the bracelet -->
        <circle cx="400" cy="200" r="6" fill="url(#gemGradient)" stroke="#000080"/><circle cx="370.71067811865476" cy="221.21320343559643" r="6" fill="url(#gemGradient)" stroke="#000080"/><circle cx="300" cy="230" r="6" fill="url(#gemGradient)" stroke="#000080"/><circle cx="229.28932188134524" cy="221.21320343559643" r="6" fill="url(#gemGradient)" stroke="#000080"/><circle cx="200" cy="200" r="6" fill="url(#gemGradient)" stroke="#000080"/><circle cx="229.28932188134524" cy="178.78679656440357" r="6" fill="url(#gemGradient)" stroke="#000080"/><circle cx="300" cy="170" r="6" fill="url(#gemGradient)" stroke="#000080"/><circle cx="370.71067811865476" cy="178.78679656440357" r="6" fill="url(#gemGradient)" stroke="#000080"/>
        
        <text x="300" y="380" text-anchor="middle" 
              font-family="serif" font-size="16" fill="#B8860B">
          Gold Bracelet
        </text>
      </svg>
    