<svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
  <title>6side jewelry</title>
  <defs>
    <!-- Gradient for elegant jewelry look -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <!-- Diamond shape for jewelry theme -->
    <polygon id="diamond" points="10,5 15,0 25,0 30,5 25,15 15,15" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="0.5"/>
  </defs>
  
  <!-- 6-sided hexagon representing "6side" -->
  <g transform="translate(10,10)">
    <polygon points="15,2 25,7 25,17 15,22 5,17 5,7" 
             fill="url(#goldGradient)" 
             stroke="#B8860B" 
             stroke-width="1.5"/>
    
    <!-- Number "6" in the center -->
    <text x="15" y="16" 
          font-family="serif" 
          font-size="12" 
          font-weight="bold" 
          text-anchor="middle" 
          fill="#8B4513">6</text>
  </g>
  
  <!-- Text "side jewelry" -->
  <g transform="translate(45,10)">
    <text x="0" y="12" 
          font-family="serif" 
          font-size="14" 
          font-weight="bold" 
          fill="url(#goldGradient)">side</text>
    
    <text x="0" y="26" 
          font-family="serif" 
          font-size="12" 
          font-style="italic" 
          fill="#B8860B">jewelry</text>
  </g>
  
  <!-- Decorative diamonds -->
  <use href="#diamond" transform="translate(120,8) scale(0.4)" opacity="0.7"/>
  <use href="#diamond" transform="translate(135,12) scale(0.3)" opacity="0.5"/>
  <use href="#diamond" transform="translate(150,6) scale(0.35)" opacity="0.6"/>
</svg>
